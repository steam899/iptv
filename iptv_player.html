<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(90deg, #1f1f1f, #282828);
            color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        #container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }
        #video-player {
            flex: 2;
            background: #000;
            position: relative;
        }
        #video-player video {
            width: 100%;
            height: 100%;
        }
        #channel-list {
            flex: 1;
            overflow-y: scroll;
            padding: 10px;
            background: #333;
        }
        .channel {
            display: flex;
            align-items: center;
            margin: 10px 0;
            cursor: pointer;
        }
        .channel img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .channel-name {
            flex: 1;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-around;
            width: 80%;
        }
        .button {
            padding: 10px 20px;
            background: #444;
            border: none;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }
        .button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="video-player">
            <video id="video" controls>
                <source src="stream_url.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="controls">
                <button class="button" onclick="play()">Play</button>
                <button class="button" onclick="pause()">Pause</button>
                <button class="button" onclick="stop()">Stop</button>
                <button class="button" onclick="fullScreen()">Full Screen</button>
            </div>
        </div>
        <div id="channel-list">
            <div class="channel" onclick="loadChannel('channel1')">
                <img src="logo1.png" alt="Channel 1">
                <div class="channel-name">Channel 1</div>
                <div class="channel-number">1</div>
            </div>
            <div class="channel" onclick="loadChannel('channel2')">
                <img src="logo2.png" alt="Channel 2">
                <div class="channel-name">Channel 2</div>
                <div class="channel-number">2</div>
            </div>
            <!-- More channels can be added here -->
        </div>
    </div>
    <script>
        function play() {
            document.getElementById('video').play();
        }

        function pause() {
            document.getElementById('video').pause();
        }

        function stop() {
            let video = document.getElementById('video');
            video.pause();
            video.currentTime = 0;
        }

        function fullScreen() {
            let video = document.getElementById('video');
            if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        }

        function loadChannel(channel) {
            // Load the selected channel's stream
        }
    </script>
</body>
</html>
