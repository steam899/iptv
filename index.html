<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <link href="https://vjs.zencdn.net/7.11.4/video-js.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #player { width: 100%; height: auto; }
        #channel-list { margin: 20px; }
        .channel { cursor: pointer; padding: 10px; background-color: #f1f1f1; margin: 5px 0; }
        .channel:hover { background-color: #ddd; }
    </style>
</head>
<body>
    <h1>IPTV Player</h1>
    <video id="player" class="video-js" controls preload="auto" width="640" height="264"></video>
    <div id="channel-list"></div>
    <script src="https://vjs.zencdn.net/7.11.4/video.min.js"></script>
    <script>
        // Sample M3U Playlist URL
        const m3uUrl = "https://example.com/your-playlist.m3u";

        // Function to load M3U playlist
        async function loadM3U() {
            const response = await fetch(m3uUrl);
            const data = await response.text();
            const channels = parseM3U(data);
            populateChannelList(channels);
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = null;

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = { name: line.split(',')[1], url: '' };
                } else if (currentChannel && !line.startsWith('#')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            });

            return channels;
        }

        function populateChannelList(channels) {
            const channelListDiv = document.getElementById('channel-list');
            channels.forEach(channel => {
                const channelDiv = document.createElement('div');
                channelDiv.className = 'channel';
                channelDiv.textContent = channel.name;
                channelDiv.onclick = () => playChannel(channel.url);
                channelListDiv.appendChild(channelDiv);
            });
        }

        function playChannel(url) {
            const player = videojs('player');
            player.src({ type: 'video/m3u8', src: url });
            player.play();
        }

        // Load M3U Playlist on page load
        loadM3U();
    </script>
</body>
</html>
